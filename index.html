<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-DOS Executive</title>
    <style>
        /* THE 1985 BIT-ACCURATE LOOK */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background-color: #0000AA; /* Original Blue */
            font-family: "Courier New", Courier, monospace;
            overflow: hidden; color: white;
        }

        /* TOP SYSTEM BAR */
        #top-bar {
            background-color: white; color: black;
            height: 25px; line-height: 25px;
            padding: 0 10px; font-weight: bold;
            border-bottom: 2px solid black;
        }

        /* THE TILING CONTAINER (The "CON": No Overlapping!) */
        #desktop {
            display: flex; /* This forces windows to sit side-by-side */
            height: calc(100% - 75px);
            width: 100%; padding: 5px; box-sizing: border-box;
            gap: 5px;
        }

        .window {
            background-color: white; color: black;
            border: 2px solid #00AAAA; /* Cyan borders */
            flex: 1; /* Each window takes equal space */
            display: flex; flex-direction: column;
        }

        .window-title {
            background-color: #0000AA; color: white;
            padding: 2px 5px; font-size: 14px;
        }

        .window-content { padding: 10px; flex-grow: 1; overflow-y: auto; }

        /* ICON AREA (Precursor to the Taskbar) */
        #icon-bar {
            position: fixed; bottom: 0; width: 100%;
            height: 50px; background-color: #ccc;
            border-top: 2px solid black; display: flex; align-items: center;
        }
        
        .icon { width: 40px; height: 40px; margin: 5px; border: 1px solid black; background: white; cursor: pointer;}
    </style>
</head>
<body>

    <div id="top-bar">MS-DOS Executive</div>

    <div id="desktop">
        <!-- APP 1: MS-DOS EXECUTIVE -->
        <div class="window">
            <div class="window-title">A: \WINDOWS</div>
            <div class="window-content">
                <p><b>CLOCK.EXE</b></p>
                <p><b>NOTEPAD.EXE</b></p>
                <p><b>CALC.EXE</b></p>
                <p><b>REVERSI.EXE</b></p>
            </div>
        </div>

        <!-- APP 2: THE CLOCK (A "PRO" for 1985!) -->
        <div class="window">
            <div class="window-title">Clock</div>
            <div class="window-content" style="text-align: center;">
                <h2 id="time-display">00:00:00</h2>
            </div>
        </div>
    </div>

    <div id="icon-bar">
        <div class="icon" title="Main Menu"></div>
    </div>

    <script>
        // Making the Clock work
        function updateClock() {
            const now = new Date();
            document.getElementById('time-display').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
